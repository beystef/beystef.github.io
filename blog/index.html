<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog</title>
    <meta
      name="description"
      content="Simple blog archive for a personal website."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body data-page="blog">
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="../">
          <span class="brand-mark">EY</span>
          <span class="brand-text" id="brand-text"></span>
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a href="../">Home</a>
          <a href="../#about">About</a>
          <a href="../#cv">CV</a>
          <a href="../#projects">Projects</a>
          <a href="../#contact">Contact</a>
        </nav>
      </header>

      <main>
        <section class="hero hero-compact">
          <div class="hero-copy">
            <p class="eyebrow">Writing archive</p>
            <h1>Blog</h1>
            <p class="hero-text">
              A simple place for essays, build notes, project updates, and ideas.
            </p>
          </div>
        </section>

        <section class="section">
          <div class="blog-stack" id="blog-archive"></div>
        </section>
      </main>
    </div>

    <script src="../data/site-data.js"></script>
    <script src="../script.js"></script>
  </body>
</html>
